name: Docker image

on:
  push:
    branches:
      - 'main'
    tags:
      - '**'
    # Only build Docker images if relevant files change.
    paths:
      - .github/workflows/docker.yml
      - src/**
      - .dockerignore
      - Cargo*
      - Dockerfile

jobs:
  docker-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            artifact_suffix: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            artifact_suffix: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    environment: Docker
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: klausi
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=klausi/mastodon-bluesky-sync,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
      -
        name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      -
        name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.artifact_suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    runs-on: ubuntu-latest
    needs: docker-build
    environment: Docker
    steps:
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: klausi
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      -
        name: Create and push manifest list
        run: |
          set -euo pipefail
          refs=""
          for f in /tmp/digests/*; do
            digest="$(basename "$f")"
            refs="$refs klausi/mastodon-bluesky-sync@sha256:$digest"
          done

          tags=""
          if [ "${{ github.ref_type }}" = "branch" ] && [ "${{ github.ref_name }}" = "main" ]; then
            tags="$tags -t klausi/mastodon-bluesky-sync:latest"
          fi
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tags="$tags -t klausi/mastodon-bluesky-sync:${{ github.ref_name }}"
          fi

          docker buildx imagetools create $tags $refs
